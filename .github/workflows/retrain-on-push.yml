name: Auto Train ML Model

on:
  push:
    branches: [ main ]   # runs every time you push to main
  pull_request:
    branches: [ main ]   # runs on pull requests to main
  workflow_dispatch:     # allows manual trigger from GitHub UI
    schedule:
    - cron: "0 0 * * *"   # runs daily at midnight UTC

jobs:
  train:
    runs-on: ubuntu-latest   # GitHub-hosted Linux runner

    steps:
      # 1. Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Cache pip packages
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 5. Preprocess new data
      - name: Preprocess new data
        run: python src/preprocess_new_data.py

      # 6. Train the model
      - name: Train model
        run: python src/model.py

      # 7. Run monitoring
      - name: Run monitoring
        run: python src/monitor.py

      # 8. Upload results as artefacts
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: model-results
          path: |
            model_results.png
            metrics.txt

